<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <title>Herbario Digital UIMQROO</title>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- EJEMPLO: GUAYABA (Pichi’) - Aplica estos mismos valores a las otras 4 -->
        <a-marker type="pattern" url="guayaba.patt">
            
            <!-- PANEL DE FONDO: Reducido de 4.2 a 2.5 para que no sea una "megapantalla" -->
            <a-plane 
                position="0 0.5 0" 
                rotation="-70 0 0" 
                width="2.5" height="1.8" 
                color="#1b4332" 
                material="opacity: 0.9; transparent: true">
            </a-plane>

            <!-- 1. NOMBRE MAYA Y ESPAÑOL: Reducido de 5 a 2.8 -->
            <a-text 
                value="Pichi' (Guayaba)" 
                position="0 0.8 0.1" 
                rotation="-70 0 0" 
                align="center" 
                color="#FFFFFF" 
                width="2.8">
            </a-text>

            <!-- 2. NOMBRE CIENTÍFICO: Reducido de 3.8 a 2.2 -->
            <a-text 
                value="Psidium guajava" 
                position="0 0.3 0.1" 
                rotation="-70 0 0" 
                align="center" 
                color="#FFF000" 
                width="2.2">
            </a-text>

            <!-- 3. USO MEDICINAL: Reducido de 3.2 a 1.8 -->
            <a-text 
                value="Uso: Antidiarreico y para\nproblemas estomacales." 
                position="0 -0.2 0.1" 
                rotation="-70 0 0" 
                align="center" 
                color="#d8f3dc" 
                width="1.8">
            </a-text>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
