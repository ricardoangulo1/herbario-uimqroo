<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <title>Herbario Digital UIMQROO</title>

    <style>
        /* Estilo para el botón del PDF */
        .btn-saber-mas {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            background-color: #1b4332;
            color: white;
            border: 2px solid #FFF000;
            border-radius: 30px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            display: none; /* Oculto por defecto */
            z-index: 999;
            text-decoration: none;
        }
    </style>

    <script>
        AFRAME.registerComponent('guayaba-handler', {
            init: function () {
                this.marker = this.el;
                this.sound = document.querySelector("#sonidoGuayaba");
                this.button = document.querySelector("#btnPdf");
                
                this.marker.addEventListener('markerFound', () => {
                    this.sound.components.sound.playSound(); // Reproduce audio en maya
                    this.button.style.display = 'block';     // Muestra el botón del PDF
                });
                
                this.marker.addEventListener('markerLost', () => {
                    this.sound.components.sound.stopSound();
                    this.button.style.display = 'none';      // Oculta el botón
                });
            }
        });
    </script>
</head>

<body style="margin: 0px; overflow: hidden;">
    <!-- BOTÓN QUE ABRE EL PDF -->
    <a href="guayaba_info.pdf" target="_blank" id="btnPdf" class="btn-saber-mas">
        📄 LEER RECETA COMPLETA
    </a>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <audio id="audioGuayaba" src="guayaba.mp3" preload="auto"></audio>
        </a-assets>

        <!-- MARCADOR DE GUAYABA -->
        <a-marker type="pattern" url="guayaba.patt" guayaba-handler>
            <a-entity id="sonidoGuayaba" sound="src: #audioGuayaba"></a-entity>

            <a-entity scale="0.25 0.25 0.25">
                <a-plane rotation="-90 0 0" width="4.5" height="6" color="#1b4332" material="opacity: 0.9"></a-plane>
                <a-text value="Pichi' (Guayaba)" position="0 0.2 -2.2" rotation="-90 0 0" align="center" color="#FFFFFF" width="6"></a-text>
                <a-text value="Psidium guajava" position="0 0.2 0" rotation="-90 0 0" align="center" color="#FFF000" width="4.5"></a-text>
                <a-text value="Uso: Antidiarreico y para\nproblemas estomacales." position="0 0.2 2.2" rotation="-90 0 0" align="center" color="#d8f3dc" width="3.5" wrap-count="25"></a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
