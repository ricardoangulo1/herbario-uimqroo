<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Librerías de RA (A-Frame y AR.js) -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <title>Herbario Digital UIMQROO - Salud Comunitaria</title>
</head>

<body style="margin: 0px; overflow: hidden;">
    <!-- Escena configurada para uso en exteriores con webcam -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- 1. GUAYABA (Pichi’) -->
        <a-marker type="pattern" url="guayaba.patt">
            <a-plane position="0 0.05 0" rotation="-90 0 0" width="1.2" height="1.0" color="#1b4332" material="opacity: 0.9; transparent: true"></a-plane>
            <a-text value="Pichi' (Guayaba)" position="0 0.35 0.1" rotation="-90 0 0" align="center" color="#FFFFFF" width="1.5"></a-text>
            <a-text value="Psidium guajava" position="0 0.15 0.1" rotation="-90 0 0" align="center" color="#FFF000" width="1.1"></a-text>
            <a-text value="Uso: Antidiarreico y para\nproblemas estomacales." position="0 -0.15 0.1" rotation="-90 0 0" align="center" color="#d8f3dc" width="0.9"></a-text>
        </a-marker>

        <!-- 2. ALBAHACA DE MONTE (X'kakaltuum) -->
        <a-marker type="pattern" url="albahaca.patt">
            <a-plane position="0 0.05 0" rotation="-90 0 0" width="1.2" height="1.0" color="#1b4332" material="opacity: 0.9; transparent: true"></a-plane>
            <a-text value="X'kakaltuum (Albahaca)" position="0 0.35 0.1" rotation="-90 0 0" align="center" color="#FFFFFF" width="1.5"></a-text>
            <a-text value="Ocimum campechianum" position="0 0.15 0.1" rotation="-90 0 0" align="center" color="#FFF000" width="1.1"></a-text>
            <a-text value="Uso: Alivio de la fiebre y\nproblemas digestivos." position="0 -0.15 0.1" rotation="-90 0 0" align="center" color="#d8f3dc" width="0.9"></a-text>
        </a-marker>

        <!-- 3. SÁBILA (Hunab-ku) -->
        <a-marker type="pattern" url="sabila.patt">
            <a-plane position="0 0.05 0" rotation="-90 0 0" width="1.2" height="1.0" color="#1b4332" material="opacity: 0.9; transparent: true"></a-plane>
            <a-text value="Hunab-ku (Sabila)" position="0 0.35 0.1" rotation="-90 0 0" align="center" color="#FFFFFF" width="1.5"></a-text>
            <a-text value="Aloe vera" position="0 0.15 0.1" rotation="-90 0 0" align="center" color="#FFF000" width="1.1"></a-text>
            <a-text value="Uso: Quemaduras, golpes e\nirritaciones cutaneas." position="0 -0.15 0.1" rotation="-90 0 0" align="center" color="#d8f3dc" width="0.9"></a-text>
        </a-marker>

        <!-- 4. MAGUEY MORADO (Chak ts'am) -->
        <a-marker type="pattern" url="maguey.patt">
            <a-plane position="0 0.05 0" rotation="-90 0 0" width="1.2" height="1.0" color="#1b4332" material="opacity: 0.9; transparent: true"></a-plane>
            <a-text value="Chak ts'am (Maguey)" position="0 0.35 0.1" rotation="-90 0 0" align="center" color="#FFFFFF" width="1.5"></a-text>
            <a-text value="Tradescantia spathacea" position="0 0.15 0.1" rotation="-90 0 0" align="center" color="#FFF000" width="1.1"></a-text>
            <a-text value="Uso: Antiinflamatorio y para\nafecciones respiratorias." position="0 -0.15 0.1" rotation="-90 0 0" align="center" color="#d8f3dc" width="0.9"></a-text>
        </a-marker>

        <!-- 5. RUDA (Lool) -->
        <a-marker type="pattern" url="ruda.patt">
            <a-plane position="0 0.05 0" rotation="-90 0 0" width="1.2" height="1.0" color="#1b4332" material="opacity: 0.9; transparent: true"></a-plane>
            <a-text value="Lool (Ruda)" position="0 0.35 0.1" rotation="-90 0 0" align="center" color="#FFFFFF" width="1.5"></a-text>
            <a-text value="Ruta chalepensis" position="0 0.15 0.1" rotation="-90 0 0" align="center" color="#FFF000" width="1.1"></a-text>
            <a-text value="Uso: Dolores de oido, colicos\ny 'mal aire'." position="0 -0.15 0.1" rotation="-90 0 0" align="center" color="#d8f3dc" width="0.9"></a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
